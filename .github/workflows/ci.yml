name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI never uses the ~0.5 GB local model; the AI feature exercises its
  # deterministic fallback instead. (node-llama-cpp is also omitted below.)
  LINKHQ_DISABLE_MODEL: "1"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Skip the optional native model dependency (node-llama-cpp) — it isn't
      # needed for the test suite and keeps installs fast and portable.
      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Type-check
        run: npx tsc -p tsconfig.json --noEmit

      - name: Unit tests (Vitest)
        run: npm test

      # Starts the server, runs the Doc Detective specs (API, CLI, inline doc,
      # AI eval), then shuts the server down. The browser-based UI spec is
      # skipped here (no browser installed) and covered by the docs-ui job.
      - name: Docs as Tests
        run: npm run test:docs

  docs-ui:
    name: Docs as Tests (UI / browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=optional

      # Doc Detective lazily installs its runtime + browsers. Install just
      # Chrome (headless) + chromedriver for the UI spec.
      - name: Install Doc Detective browser
        run: |
          npx doc-detective install runtime --yes
          npx doc-detective install browsers chrome chromedriver --yes

      - name: Run full Doc Detective suite (incl. UI)
        run: npm run test:docs
